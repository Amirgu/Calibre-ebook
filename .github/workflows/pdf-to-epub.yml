name: Convert PDF to EPUB (Apple Books optimized)

on:
  push:
    branches:
      - master
      - "claude/**"
    paths:
      - "**.pdf"
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Calibre
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb libgl1 libegl1 libopengl0
          # Install latest Calibre from official installer (includes full ebook-convert)
          wget -nv -O- https://download.calibre-ebook.com/linux-installer.sh | sudo sh /dev/stdin install_dir=/opt/calibre

      - name: Find PDF file
        id: find_pdf
        run: |
          PDF_FILE=$(find . -maxdepth 2 -name "*.pdf" | head -1)
          if [ -z "$PDF_FILE" ]; then
            echo "No PDF found in repository."
            exit 1
          fi
          echo "pdf_file=$PDF_FILE" >> $GITHUB_OUTPUT
          # Derive a clean EPUB output name
          BASENAME=$(basename "$PDF_FILE" .pdf)
          EPUB_NAME="${BASENAME}.epub"
          echo "epub_file=$EPUB_NAME" >> $GITHUB_OUTPUT
          echo "Found PDF: $PDF_FILE"
          echo "Output EPUB: $EPUB_NAME"

      - name: Convert PDF → EPUB3 (Apple Books optimised)
        env:
          PDF_FILE: ${{ steps.find_pdf.outputs.pdf_file }}
          EPUB_FILE: ${{ steps.find_pdf.outputs.epub_file }}
        run: |
          # Run inside virtual display so Calibre GUI libs don't complain
          export DISPLAY=:99
          Xvfb :99 -screen 0 1024x768x24 &

          /opt/calibre/ebook-convert "$PDF_FILE" "$EPUB_FILE" \
            \
            `# ── Metadata ──────────────────────────────────────────────` \
            --authors "C.G. Jung" \
            --title "Psychology and Alchemy" \
            --series "Collected Works of C.G. Jung" \
            --series-index "12" \
            --language "en" \
            --pubdate "1953-01-01" \
            --publisher "Princeton University Press" \
            \
            `# ── EPUB3 output (required for Apple Books) ──────────────` \
            --epub-version "3" \
            --pretty-print \
            \
            `# ── Table of Contents ────────────────────────────────────` \
            --use-auto-toc \
            --toc-title "Table of Contents" \
            --toc-threshold 6 \
            --max-toc-links 200 \
            \
            `# ── Chapter / structure detection ────────────────────────` \
            --chapter "//*[name()='h1' or name()='h2' or name()='h3']" \
            --chapter-mark "pagebreak" \
            --page-breaks-before "//*[name()='h1' or name()='h2']" \
            \
            `# ── Layout & typography (Apple Books friendly) ───────────` \
            --margin-top 72 \
            --margin-bottom 72 \
            --margin-left 72 \
            --margin-right 72 \
            --base-font-size 12 \
            --font-size-mapping "10,12,14,16,18,20,22,24" \
            --minimum-line-height 140 \
            \
            `# ── Font handling ────────────────────────────────────────` \
            --embed-all-fonts \
            --subset-embedded-fonts \
            --unsmarten-punctuation \
            \
            `# ── Images ───────────────────────────────────────────────` \
            --preserve-cover-aspect-ratio \
            --jpeg-compression 85 \
            \
            `# ── PDF-specific input tuning ────────────────────────────` \
            --pdf-serif-family "Georgia" \
            --pdf-sans-family "Helvetica Neue" \
            --pdf-mono-family "Courier New" \
            --pdf-default-font-size 12 \
            --pdf-mono-font-size 10 \
            \
            `# ── Heuristic processing ─────────────────────────────────` \
            --enable-heuristics \
            --dehyphenate \
            --fix-indents \
            --delete-blank-paragraphs \
            --format-scene-breaks \
            --italicize-common-cases \
            \
            --verbose

          echo "Conversion complete. EPUB size: $(du -sh "$EPUB_FILE" | cut -f1)"

      - name: Validate EPUB structure
        env:
          EPUB_FILE: ${{ steps.find_pdf.outputs.epub_file }}
        run: |
          # Quick sanity check – verify it is a valid ZIP/EPUB container
          python3 - <<'PYEOF'
          import sys, os, zipfile
          epub = os.environ["EPUB_FILE"]
          try:
              with zipfile.ZipFile(epub) as z:
                  names = z.namelist()
                  assert "mimetype" in names, "Missing mimetype"
                  assert any("content.opf" in n or ".opf" in n for n in names), "Missing OPF"
                  ncx_or_nav = [n for n in names if n.endswith(".ncx") or "nav" in n]
                  print(f"EPUB valid — {len(names)} files inside.")
                  print(f"Navigation files: {ncx_or_nav}")
          except Exception as e:
              print(f"Validation failed: {e}")
              sys.exit(1)
          PYEOF

      - name: Upload EPUB as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: epub-apple-books
          path: ${{ steps.find_pdf.outputs.epub_file }}
          retention-days: 30

      - name: Commit EPUB back to repository
        env:
          EPUB_FILE: ${{ steps.find_pdf.outputs.epub_file }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$EPUB_FILE"
          if git diff --cached --quiet; then
            echo "No changes to commit (EPUB already up-to-date)."
          else
            git commit -m "chore: add Apple-Books-optimised EPUB converted from PDF

          Converted using Calibre ebook-convert with EPUB3 output.
          Optimised for Apple Books / Apple Livres:
          - EPUB 3 format with navigation document
          - Embedded & subsetted fonts
          - Auto-generated Table of Contents
          - Heuristic paragraph / hyphenation fixes
          - Jung – Psychology and Alchemy (CW Vol. 12)"
            git push origin HEAD
          fi
